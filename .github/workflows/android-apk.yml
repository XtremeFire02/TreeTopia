name: Build Android APK

# Builds an installable debug APK in the cloud (GitHub's runners have the
# Android SDK and open network, which the dev container does not). The APK is
# uploaded as a build artifact and published to the "android-debug" release so
# it can be downloaded straight onto a phone.

on:
  workflow_dispatch:
  push:
    branches: [claude/mobile-gaming-optimization-gim1bh]
    paths:
      - 'public/**'
      - 'capacitor.config.json'
      - 'package.json'
      - '.github/workflows/android-apk.yml'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - uses: android-actions/setup-android@v3

      - name: Install dependencies
        run: npm install

      - name: Verify the server URL is configured
        run: |
          if ! grep -qP "SERVER_URL\s*=\s*'[^']+'" public/js/config.js; then
            echo "::error::SERVER_URL is empty in public/js/config.js. Set it to your live server before building the app, or the installed app will have nothing to connect to."
            exit 1
          fi
          echo "Using server: $(grep -oP "SERVER_URL\s*=\s*'\K[^']+" public/js/config.js)"

      - name: Generate the Android project
        run: npx cap add android

      - name: Sync web assets into the Android project
        run: npx cap sync android

      - name: Allow cleartext + lock to landscape
        run: |
          manifest=android/app/src/main/AndroidManifest.xml
          if ! grep -q 'usesCleartextTraffic' "$manifest"; then
            sed -i 's/<application /<application android:usesCleartextTraffic="true" /' "$manifest"
          fi
          # lock the main activity to landscape (sensor-driven, either way up)
          if ! grep -q 'screenOrientation' "$manifest"; then
            sed -i 's#android:name="\.MainActivity"#android:name=".MainActivity"\n            android:screenOrientation="sensorLandscape"#' "$manifest"
          fi

      - name: Build the debug APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon

      - name: Upload the APK as an artifact
        uses: actions/upload-artifact@v4
        with:
          name: treetopia-android-debug
          path: android/app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error

      - name: Publish the APK to the android-debug release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: android-debug
          name: TreeTopia Android (debug)
          body: |
            Debug APK for sideloading onto an Android device.
            Built from the latest push — install by opening this APK on your phone
            (you'll need to allow "install from unknown sources").
          files: android/app/build/outputs/apk/debug/app-debug.apk
